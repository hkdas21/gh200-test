name: 🚀 CoHack Journey

on: [push]

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: 👋 Say Hello
        run: echo "Hello CoHack!"

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📂 List Files
        run: ls -la

      - name: Generate ASCII Artwork
        run: |
          sudo apt-get install -y figlet
          figlet -f digital "GH-200 CoHack for ANZ"
          echo "----------------------------------------"
          figlet -f digital "GitHub Actions"
          echo "ASCII Art generated using figlet!"

      - name: RUn Shell Script
        run: |
          chmod +x /greet.sh
          ./greet.sh
          
