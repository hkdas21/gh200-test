name: 🚀 CoHack Journey

on:
  push:
    branches: main
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch: 

env:                                    # Workflow-level
  WORKSHOP_NAME: "GH-200 CoHack"
  TRAINER: "Himanshu Kumar"

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Step with timeout
        timeout-minutes: 2
        run: |
          echo "This step must complete in 2 mins"
          echo "Completed within time!"

  
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🔨 Create Build Report
        run: |
          mkdir -p build-output
          echo "Build Report - $(date)" > build-output/build-report.txt
          echo "Commit: $GITHUB_SHA" >> build-output/build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-output/build-report.txt
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-output/
          retention-days: 5
      - name: 🎨 Use Custom Banner Action
        uses: ./ascii-action.yml
        id: banner
        with:
          text: "CoHack!"
          font: "digital"
      - name: Show Banner Output
        run: echo "Generated banner output captured in outputs!"

