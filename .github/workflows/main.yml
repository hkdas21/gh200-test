name: 🚀 CoHack Journey

on:
  push:
    branches: main
  pull_request:
    branches: main
  schedule: 
    - cron: '0 9 * * 1'
  workflow_dispatch: 

env:                                    # Workflow-level
  WORKSHOP_NAME: "GH-200 CoHack"
  TRAINER: "Himanshu Kumar"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true           # Cancel older runs on same branch


jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Step with timeout
        timeout-minutes: 2
        run: |
          echo "This step must complete in 2 mins"
          sleep 30
          echo "Completed within time!"

  
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🔨 Create Build Report
        run: |
          mkdir -p build-output
          echo "Build Report - $(date)" > build-output/build-report.txt
          echo "Commit: $GITHUB_SHA" >> build-output/build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-output/build-report.txt
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-output/
          retention-days: 5

  test:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest        # Skip this combo
            python-version: '3.10'
        include:
          - os: ubuntu-latest         # Add extra config
            python-version: '3.12'
            experimental: true
      fail-fast: false               # Don't cancel others if one fails
      max-parallel: 3
    steps:
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 🧪 Run Tests
        run: |
          echo "Testing on ${{ matrix.os }} with Python ${{ matrix.python-version }}"
          python --version
