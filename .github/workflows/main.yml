name: 🚀 CoHack Journey

on:
  push:
    branches: main
  pull_request:
    branches: main
  schedule: 
    - cron: '0 9 * * 1'
  workflow_dispatch: 

env:                                    # Workflow-level
  WORKSHOP_NAME: "GH-200 CoHack"
  TRAINER: "Himanshu Kumar"

jobs:
  setup:
    env:
      JOB_ENV: "Setup Phase"              #Job Level
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Show All Variable Levels
        env:
          STEP_VAR: "I am step-scoped"  # Step-level
        run: |
          echo "Workflow : $WORKSHOP_NAME"
          echo "Job      : $JOB_ENV"
          echo "Step     : $STEP_VAR"
          echo "Default  : $GITHUB_ACTOR"

      - name: 🔐 Use Secret
        env:
          MY_SECRET: ${{ secrets.MY_API_KEY }}
        run: |
          echo "$STEP_VAR"
          echo "Secret set: ${{ secrets.MY_API_KEY != '' }}"
          echo "Try print : $MY_SECRET"
