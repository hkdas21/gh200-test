name: 🚀 CoHack Journey

on:
  push:
    branches: main
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch: 

env:                                    # Workflow-level
  WORKSHOP_NAME: "GH-200 CoHack"
  TRAINER: "Himanshu Kumar"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true           # Cancel older runs on same branch


jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Step with timeout
        timeout-minutes: 2
        run: |
          echo "This step must complete in 2 mins"
          sleep 30
          echo "Completed within time!"

  
  build:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      - name: 🔨 Create Build Report
        run: |
          mkdir -p build-output
          echo "Build Report - $(date)" > build-output/build-report.txt
          echo "Commit: $GITHUB_SHA" >> build-output/build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-output/build-report.txt
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-output/
          retention-days: 5

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📋 Show Context Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Runner: ${{ runner.os }} / ${{ runner.arch }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run Number: ${{ github.run_number }}"

      - name: ✅ Deploy Step (only on success)
        if: success()
        run: echo "🚀 Deploying to production!"

      - name: 🚨 Notify on Failure
        if: failure()
        run: echo "❌ Deployment failed! Sending alert..."

      - name: 🧹 Always Cleanup
        if: always()
        run: echo "🧹 Cleaning up resources..."
      - name: 🐛 Debug Information
        run: |
          echo "Debug mode: ${{ secrets.ACTIONS_STEP_DEBUG }}"
          echo "Runner Debug: $RUNNER_DEBUG"
          # Access workflow logs via REST API
          echo "Logs URL: https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/logs"

      - name: 📡 Fetch Workflow Run Info via REST API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            | jq '{id: .id, status: .status, conclusion: .conclusion, run_number: .run_number}'
