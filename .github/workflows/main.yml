name: 🚀 CoHack Journey

on: [push]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🎨 Generate ASCII Art
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200"
      - name: 🖥️ Run Greeting Script
        run: |
          chmod +x greet.sh
          ./greet.sh

  build:
    runs-on: ubuntu-latest
    needs: setup                    # ← Runs AFTER setup
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🔨 Create Build Report
        run: |
          mkdir -p build-output
          echo "Build Report - $(Date)" > build-output/buildreport.txt
          echo "Commit: $GITHUB_SHA" >> build-output/build-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> build-output/build-report.tx
      
      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-output/
          retention-days: 5


  test:
    runs-on: ubuntu-latest
    needs: build                    # ← Runs AFTER build
    steps:
      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report
      - name: 🔍 Inspect Artifact
        run: |
          echo "--- Downloaded Artifact Contents ---"
          cat build-report.txt
          
